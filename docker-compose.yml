services:
  aimili:
    build:
      context: .
      dockerfile: docker/full/Dockerfile
    image: aimili-vpn-panel:latest
    container_name: aimili-vpn-panel
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      AIMILI_SERVICE_MODE: full
      VPNGATE_DATA_DIR: /data
      UI_HOST: 0.0.0.0
      UI_PORT: ${UI_PORT:-8787}
      LOCAL_PROXY_HOST: 0.0.0.0
      LOCAL_PROXY_PORT: ${LOCAL_PROXY_PORT:-7928}
      FETCH_INTERVAL_SECONDS: ${FETCH_INTERVAL_SECONDS:-960}
      CHECK_INTERVAL_SECONDS: ${CHECK_INTERVAL_SECONDS:-960}
      TARGET_VALID_NODES: ${TARGET_VALID_NODES:-3}
      SECRET_PATH: ${SECRET_PATH:-}
      UI_USERNAME: ${UI_USERNAME:-}
      UI_PASSWORD: ${UI_PASSWORD:-}
    volumes:
      - ./vpngate_data:/data
